name: Reusable Deploy
on:
  workflow_call: # allows to be called from other workflow
    inputs:
      artifact-name:
        description: The name of the deployable artifact files
        required: true # if set false, then workflow canbe called without providing a value
        #if true, then value is needed
        default: dist # we can set default value
        type: string
    outputs:
      result:
        description: The result of the deployment operation
        value: ${{ jobs.deploy.outputs.outcome }}
    secrets:
      some-secret:
        required: false
jobs:
  deploy:
    outputs:
      outcome: ${{ steps.set-result.outputs.step-result }}
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }} #github actions expression
      - name: List files
        run: ls
      - name: Output information
        run: echo "Deploying and uploading ..."
      - name: Set result output
        id: set-result
        run: echo "::set-output name=step-result::success" # string success will be stored
